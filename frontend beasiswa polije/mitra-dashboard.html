<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard Mitra Beasiswa POLIJE — Kelola beasiswa yang Anda sponsori.">
  <title>Dashboard Mitra — Beasiswa POLIJE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar-main">
    <div class="container-custom d-flex justify-content-between align-items-center">
      <a href="mitra-dashboard.html" class="navbar-brand">
        <img src="assets/images/logo polije.png" alt="Logo Polije">
        <span>Beasiswa <strong>POLIJE</strong></span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <ul class="nav">
          <li class="nav-item"><a class="nav-link active" href="mitra-dashboard.html">Beranda</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#tentang-kami">Tentang Kami</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#pustaka">Panduan</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#pustaka">Pustaka</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#faq">FAQ</a></li>
        </ul>
        <div class="profile-icon" data-bs-toggle="offcanvas" data-bs-target="#profileSidebar">
          <i class="bi bi-person"></i>
        </div>
      </div>
    </div>
  </nav>

  <!-- Profile Sidebar -->
  <div class="offcanvas offcanvas-end profile-sidebar" tabindex="-1" id="profileSidebar">
    <div class="offcanvas-header">
      <div class="profile-info w-100">
        <div class="profile-avatar"><i class="bi bi-building"></i></div>
        <div class="profile-name">Prestasi Kita Foundation</div>
        <div class="profile-role">Mitra</div>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="sidebar-menu">
        <li><a href="settings.html"><i class="bi bi-gear"></i> Settings</a></li>
        <li><a href="messages.html"><i class="bi bi-envelope"></i> Pesan</a></li>
        <li class="divider"></li>
        <li><a href="#" class="logout" onclick="handleLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="section-beranda">
    <div class="container-custom">
      <div class="mitra-grid" id="mitraGrid">
        <!-- Populated by JavaScript -->
      </div>

      <!-- Pagination -->
      <div class="pagination-custom" id="mitraPagination"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container-custom">
      <div class="footer-bottom">Copyright &copy; 2026 Beasiswa POLIJE</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/beasiswa-data.js"></script>
  <script>
    function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }

    function formatDate(ds) {
      const m = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
      const d = new Date(ds);
      return d.getDate() + ' ' + m[d.getMonth()] + ' ' + d.getFullYear();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderMitraGrid();
    });

    function renderMitraGrid() {
      const grid = document.getElementById('mitraGrid');
      // Use first 3 beasiswa as mitra's scholarships
      const mitraBeasiswa = beasiswaData.slice(0, 3);

      let html = mitraBeasiswa.map(b => {
        const statusClass = b.statusPendaftaran === 'Dibuka' ? 'open' : 'closed';
        const statusText = b.statusPendaftaran === 'Dibuka' ? 'Pendaftaran Dibuka' : 'Pendaftaran Ditutup';
        const tagsHTML = b.tags.map(t => {
          let cls = 'beasiswa-tag';
          if (t === 'Swasta') cls += ' tag-swasta';
          if (t === 'Pemerintah') cls += ' tag-pemerintah';
          return '<span class="' + cls + '">' + t + '</span>';
        }).join('');

        return `
          <div class="beasiswa-card">
            <img src="${b.poster}" alt="${b.judul}" class="beasiswa-poster" onerror="this.src='https://via.placeholder.com/400x260/00BCD4/fff?text=Beasiswa'">
            <div class="beasiswa-card-body">
              <h5>${b.judul}</h5>
              <p class="beasiswa-desc">${b.deskripsiSingkat}</p>
              <div class="beasiswa-tags">${tagsHTML}</div>
              <div class="beasiswa-dates">
                <div class="date-col"><strong>Mulai</strong><span>${formatDate(b.mulai)}</span></div>
                <div class="date-col" style="text-align:right;"><strong>Deadline</strong><span>${formatDate(b.deadline)}</span></div>
              </div>
              <div class="beasiswa-status ${statusClass}">${statusText}</div>
              <a href="detail-beasiswa.html?id=${b.id}" class="btn-see-program">See Program Beasiswa</a>
            </div>
          </div>
        `;
      }).join('');

      // Add the "plus" card for uploading new beasiswa
      html += `
        <div class="add-card" onclick="window.location.href='upload-beasiswa.html'">
          <i class="bi bi-plus plus-icon" style="font-size: 5rem;"></i>
        </div>
      `;

      grid.innerHTML = html;

      // Render simple pagination
      const pagination = document.getElementById('mitraPagination');
      pagination.innerHTML = `
        <div class="page-item disabled"><i class="bi bi-chevron-left"></i></div>
        <div class="page-item active">1</div>
        <div class="page-item">2</div>
        <div class="page-item">3</div>
        <span class="page-dots">···</span>
        <div class="page-item">10</div>
        <div class="page-item"><i class="bi bi-chevron-right"></i></div>
      `;
    }
  </script>
</body>
</html>

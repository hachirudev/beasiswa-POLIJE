<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kelola Beasiswa — Admin Beasiswa POLIJE.">
  <title>Kelola Beasiswa — Admin Beasiswa POLIJE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <div class="admin-layout">
    <!-- ADMIN SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="../assets/images/logo polije.png" alt="Logo Polije">
        <span>Beasiswa POLIJE</span>
      </div>
      <ul class="admin-nav">
        <li><a href="dashboard.html"><i class="bi bi-clipboard-data"></i> Review Simulasi</a></li>
        <li><a href="beasiswa.html" class="active"><i class="bi bi-mortarboard"></i> Kelola Beasiswa</a></li>
        <li><a href="pustaka.html"><i class="bi bi-book"></i> Kelola Pustaka</a></li>
        <li><a href="faq.html"><i class="bi bi-question-circle"></i> Kelola FAQ</a></li>
        <li style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
          <a href="../main.html"><i class="bi bi-house"></i> Ke Beranda</a>
        </li>
        <li><a href="#" onclick="localStorage.clear(); window.location.href='../index.html';"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- ADMIN CONTENT -->
    <main class="admin-content">
      <div class="admin-header">
        <h2><i class="bi bi-mortarboard"></i> Kelola Beasiswa</h2>
        <a href="../upload-beasiswa.html" class="btn-submit-form" style="width:auto; display:inline-flex; align-items:center; gap:8px; padding: 10px 24px;">
          <i class="bi bi-plus-lg"></i> Tambah Beasiswa
        </a>
      </div>

      <!-- Search -->
      <div class="search-container" style="max-width: 400px; margin-bottom: 20px;">
        <input type="text" id="searchBeasiswa" placeholder="Cari beasiswa..." oninput="filterBeasiswa()">
        <button class="search-btn"><i class="bi bi-search"></i></button>
      </div>

      <!-- Table -->
      <div class="admin-table">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Judul Beasiswa</th>
              <th>Mitra / Perusahaan</th>
              <th>Tipe</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="beasiswaTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/beasiswa-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderBeasiswaTable(beasiswaData);
    });

    function renderBeasiswaTable(data) {
      const tbody = document.getElementById('beasiswaTableBody');
      tbody.innerHTML = data.map((b, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${b.judul}</strong></td>
          <td>${b.perusahaan}</td>
          <td>${b.tipePendanaan}</td>
          <td>
            <span class="status-badge ${b.statusPendaftaran === 'Dibuka' ? 'reviewed' : 'pending'}">
              ${b.statusPendaftaran}
            </span>
          </td>
          <td>
            <div class="d-flex gap-2">
              <a href="../upload-beasiswa.html?id=${b.id}" class="btn-action"><i class="bi bi-pencil"></i> Edit</a>
              <button class="btn-action danger" onclick="deleteBeasiswa(${b.id})"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterBeasiswa() {
      const q = document.getElementById('searchBeasiswa').value.toLowerCase();
      const filtered = beasiswaData.filter(b => b.judul.toLowerCase().includes(q) || b.perusahaan.toLowerCase().includes(q));
      renderBeasiswaTable(filtered);
    }

    function deleteBeasiswa(id) {
      if (confirm('Hapus beasiswa ini?')) {
        alert('Beasiswa berhasil dihapus (simulasi).');
      }
    }
  </script>
</body>
</html>

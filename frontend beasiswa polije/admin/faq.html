<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kelola FAQ — Admin Beasiswa POLIJE.">
  <title>Kelola FAQ — Admin Beasiswa POLIJE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="../assets/images/logo polije.png" alt="Logo Polije">
        <span>Beasiswa POLIJE</span>
      </div>
      <ul class="admin-nav">
        <li><a href="dashboard.html"><i class="bi bi-clipboard-data"></i> Review Simulasi</a></li>
        <li><a href="beasiswa.html"><i class="bi bi-mortarboard"></i> Kelola Beasiswa</a></li>
        <li><a href="pustaka.html"><i class="bi bi-book"></i> Kelola Pustaka</a></li>
        <li><a href="faq.html" class="active"><i class="bi bi-question-circle"></i> Kelola FAQ</a></li>
        <li style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
          <a href="../main.html"><i class="bi bi-house"></i> Ke Beranda</a>
        </li>
        <li><a href="#" onclick="localStorage.clear(); window.location.href='../index.html';"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h2><i class="bi bi-question-circle"></i> Kelola FAQ</h2>
        <button class="btn-submit-form" style="width:auto; display:inline-flex; align-items:center; gap:8px; padding: 10px 24px;" data-bs-toggle="modal" data-bs-target="#faqModal" onclick="resetFaqForm()">
          <i class="bi bi-plus-lg"></i> Tambah FAQ
        </button>
      </div>

      <div class="admin-table">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Pertanyaan</th>
              <th>Jawaban</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="faqTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Tambah/Edit FAQ -->
  <div class="modal fade modal-custom" id="faqModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="faqModalTitle">Tambah FAQ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="faqForm">
            <div class="form-group">
              <label for="faqPertanyaan">Pertanyaan</label>
              <input type="text" class="form-control" id="faqPertanyaan" placeholder="Masukkan pertanyaan" required>
            </div>
            <div class="form-group">
              <label for="faqJawaban">Jawaban</label>
              <textarea class="form-control" id="faqJawaban" rows="5" placeholder="Masukkan jawaban" required></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn-submit-form" style="width:auto; padding: 10px 24px;" onclick="saveFaq()">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/beasiswa-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderFaqTable();
    });

    function renderFaqTable() {
      const tbody = document.getElementById('faqTableBody');
      tbody.innerHTML = faqData.map((f, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${f.pertanyaan}</strong></td>
          <td>${f.jawaban.substring(0, 80)}...</td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn-action" onclick="editFaq(${f.id})"><i class="bi bi-pencil"></i> Edit</button>
              <button class="btn-action danger" onclick="deleteFaq(${f.id})"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function resetFaqForm() {
      document.getElementById('faqModalTitle').textContent = 'Tambah FAQ';
      document.getElementById('faqForm').reset();
    }

    function editFaq(id) {
      const f = faqData.find(x => x.id === id);
      if (!f) return;
      document.getElementById('faqModalTitle').textContent = 'Edit FAQ';
      document.getElementById('faqPertanyaan').value = f.pertanyaan;
      document.getElementById('faqJawaban').value = f.jawaban;
      new bootstrap.Modal(document.getElementById('faqModal')).show();
    }

    function saveFaq() {
      alert('FAQ berhasil disimpan! (simulasi)');
      bootstrap.Modal.getInstance(document.getElementById('faqModal')).hide();
    }

    function deleteFaq(id) {
      if (confirm('Hapus FAQ ini?')) {
        alert('FAQ berhasil dihapus (simulasi).');
      }
    }
  </script>
</body>
</html>

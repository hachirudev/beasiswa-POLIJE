<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kelola Pustaka — Admin Beasiswa POLIJE.">
  <title>Kelola Pustaka — Admin Beasiswa POLIJE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="../assets/images/logo polije.png" alt="Logo Polije">
        <span>Beasiswa POLIJE</span>
      </div>
      <ul class="admin-nav">
        <li><a href="dashboard.html"><i class="bi bi-clipboard-data"></i> Review Simulasi</a></li>
        <li><a href="beasiswa.html"><i class="bi bi-mortarboard"></i> Kelola Beasiswa</a></li>
        <li><a href="pustaka.html" class="active"><i class="bi bi-book"></i> Kelola Pustaka</a></li>
        <li><a href="faq.html"><i class="bi bi-question-circle"></i> Kelola FAQ</a></li>
        <li style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
          <a href="../main.html"><i class="bi bi-house"></i> Ke Beranda</a>
        </li>
        <li><a href="#" onclick="localStorage.clear(); window.location.href='../index.html';"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h2><i class="bi bi-book"></i> Kelola Pustaka</h2>
        <button class="btn-submit-form" style="width:auto; display:inline-flex; align-items:center; gap:8px; padding: 10px 24px;" data-bs-toggle="modal" data-bs-target="#pustakaModal" onclick="resetPustakaForm()">
          <i class="bi bi-plus-lg"></i> Tambah Pustaka
        </button>
      </div>

      <div class="admin-table">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Nama Dokumen</th>
              <th>Deskripsi</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="pustakaTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Tambah/Edit Pustaka -->
  <div class="modal fade modal-custom" id="pustakaModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="pustakaModalTitle">Tambah Pustaka</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="pustakaForm">
            <div class="form-group">
              <label for="pustakaNama">Nama Dokumen</label>
              <input type="text" class="form-control" id="pustakaNama" placeholder="Nama dokumen" required>
            </div>
            <div class="form-group">
              <label for="pustakaDeskripsiSingkat">Deskripsi Singkat</label>
              <input type="text" class="form-control" id="pustakaDeskripsiSingkat" placeholder="Deskripsi singkat" required>
            </div>
            <div class="form-group">
              <label for="pustakaDeskripsiLengkap">Deskripsi Lengkap</label>
              <textarea class="form-control" id="pustakaDeskripsiLengkap" rows="4" placeholder="Deskripsi lengkap dokumen" required></textarea>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label for="pustakaGambar">Upload Gambar Preview</label>
                  <input type="file" class="form-control" id="pustakaGambar" accept="image/*">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label for="pustakaFile">Upload File Dokumen</label>
                  <input type="file" class="form-control" id="pustakaFile" accept=".pdf,.doc,.docx">
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn-submit-form" style="width:auto; padding: 10px 24px;" onclick="savePustaka()">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/beasiswa-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderPustakaTable();
    });

    function renderPustakaTable() {
      const tbody = document.getElementById('pustakaTableBody');
      tbody.innerHTML = pustakaData.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${p.nama}</strong></td>
          <td>${p.deskripsiSingkat}</td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn-action" onclick="editPustaka(${p.id})"><i class="bi bi-pencil"></i> Edit</button>
              <button class="btn-action danger" onclick="deletePustaka(${p.id})"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function resetPustakaForm() {
      document.getElementById('pustakaModalTitle').textContent = 'Tambah Pustaka';
      document.getElementById('pustakaForm').reset();
    }

    function editPustaka(id) {
      const p = pustakaData.find(x => x.id === id);
      if (!p) return;
      document.getElementById('pustakaModalTitle').textContent = 'Edit Pustaka';
      document.getElementById('pustakaNama').value = p.nama;
      document.getElementById('pustakaDeskripsiSingkat').value = p.deskripsiSingkat;
      document.getElementById('pustakaDeskripsiLengkap').value = p.deskripsiLengkap;
      new bootstrap.Modal(document.getElementById('pustakaModal')).show();
    }

    function savePustaka() {
      alert('Pustaka berhasil disimpan! (simulasi)');
      bootstrap.Modal.getInstance(document.getElementById('pustakaModal')).hide();
    }

    function deletePustaka(id) {
      if (confirm('Hapus dokumen pustaka ini?')) {
        alert('Pustaka berhasil dihapus (simulasi).');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload beasiswa baru di Beasiswa POLIJE.">
  <title>Upload Beasiswa — Beasiswa POLIJE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar-main">
    <div class="container-custom d-flex justify-content-between align-items-center">
      <a href="main.html" class="navbar-brand">
        <img src="assets/images/logo polije.png" alt="Logo Polije">
        <span>Beasiswa <strong>POLIJE</strong></span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <ul class="nav">
          <li class="nav-item"><a class="nav-link" href="main.html#beranda">Beranda</a></li>
          <li class="nav-item"><a class="nav-link active" href="main.html#beranda">Beasiswa</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#tentang-kami">Tentang Kami</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#pustaka">Panduan</a></li>
          <li class="nav-item"><a class="nav-link" href="main.html#pustaka">Pustaka</a></li>
        </ul>
        <div class="profile-icon" data-bs-toggle="offcanvas" data-bs-target="#profileSidebar">
          <i class="bi bi-person"></i>
        </div>
      </div>
    </div>
  </nav>

  <!-- Profile Sidebar -->
  <div class="offcanvas offcanvas-end profile-sidebar" tabindex="-1" id="profileSidebar">
    <div class="offcanvas-header">
      <div class="profile-info w-100">
        <div class="profile-avatar"><i class="bi bi-building"></i></div>
        <div class="profile-name">Prestasi Kita Foundation</div>
        <div class="profile-role">Mitra</div>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="sidebar-menu">
        <li><a href="settings.html"><i class="bi bi-gear"></i> Settings</a></li>
        <li><a href="messages.html"><i class="bi bi-envelope"></i> Pesan</a></li>
        <li class="divider"></li>
        <li><a href="#" class="logout" onclick="handleLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </div>
  </div>

  <!-- UPLOAD FORM -->
  <div class="upload-page">
    <div class="container-custom">
      <form id="uploadForm" onsubmit="handleUploadBeasiswa(event)">
        <div class="upload-layout">

          <!-- LEFT COLUMN -->
          <div class="upload-left">
            <!-- Poster Upload -->
            <div class="poster-upload" id="posterUpload" onclick="document.getElementById('posterInput').click()">
              <i class="bi bi-plus plus-icon" id="posterPlus"></i>
              <img id="posterPreview" style="display:none;" alt="Poster Preview">
            </div>
            <input type="file" id="posterInput" style="display:none;" accept="image/*" onchange="previewPoster(this)">

            <!-- Tag Selection -->
            <div class="tag-selection-box">
              <h5>Tag Beasiswa</h5>
              <hr>

              <!-- Selected Tags -->
              <div class="d-flex justify-content-between align-items-center mb-2">
                <small class="fw-semibold">Tag yang terpilih</small>
                <span class="clear-all" onclick="clearAllTags()">Clear All</span>
              </div>
              <div class="filter-tags-selected" id="selectedTags"></div>
              <hr>

              <!-- Jenjang -->
              <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection(this)">
                  <h6>Jenjang Beasiswa</h6>
                  <i class="bi bi-chevron-up"></i>
                </div>
                <div class="filter-options">
                  <div class="filter-option"><label><input type="checkbox" value="D2" class="tag-checkbox" onchange="updateSelectedTags()"> D2</label></div>
                  <div class="filter-option"><label><input type="checkbox" value="D3" class="tag-checkbox" onchange="updateSelectedTags()"> D3</label></div>
                  <div class="filter-option"><label><input type="checkbox" value="D4" class="tag-checkbox" onchange="updateSelectedTags()"> D4</label></div>
                  <div class="filter-option"><label><input type="checkbox" value="S1" class="tag-checkbox" onchange="updateSelectedTags()"> S1</label></div>
                  <div class="filter-option"><label><input type="checkbox" value="S2" class="tag-checkbox" onchange="updateSelectedTags()"> S2</label></div>
                  <div class="filter-option"><label><input type="checkbox" value="S3" class="tag-checkbox" onchange="updateSelectedTags()"> S3</label></div>
                </div>
              </div>

              <!-- Tipe Pendanaan -->
              <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection(this)">
                  <h6>Tipe Pendanaan Beasiswa</h6>
                  <i class="bi bi-chevron-up"></i>
                </div>
                <div class="filter-options">
                  <div class="filter-option"><label><input type="radio" name="uploadPendanaan" value="Fully Funded" class="tag-radio" onchange="updateSelectedTags()"> Fully Funded</label></div>
                  <div class="filter-option"><label><input type="radio" name="uploadPendanaan" value="Partially Funded" class="tag-radio" onchange="updateSelectedTags()"> Partially Funded</label></div>
                  <div class="filter-option"><label><input type="radio" name="uploadPendanaan" value="Self Funded" class="tag-radio" onchange="updateSelectedTags()"> Self Funded</label></div>
                </div>
              </div>

              <!-- Tipe Beasiswa -->
              <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection(this)">
                  <h6>Tipe Beasiswa</h6>
                  <i class="bi bi-chevron-up"></i>
                </div>
                <div class="filter-options">
                  <div class="filter-option"><label><input type="radio" name="uploadTipe" value="Company/Institution Scholarship" class="tag-radio" onchange="updateSelectedTags()"> Company/Institution Scholarship</label></div>
                  <div class="filter-option"><label><input type="radio" name="uploadTipe" value="Government Scholarship" class="tag-radio" onchange="updateSelectedTags()"> Government Scholarship</label></div>
                  <div class="filter-option"><label><input type="radio" name="uploadTipe" value="University Scholarship" class="tag-radio" onchange="updateSelectedTags()"> University Scholarship</label></div>
                </div>
              </div>
            </div>
          </div>

          <!-- RIGHT COLUMN -->
          <div class="upload-right">
            <div class="form-section" style="margin-bottom: 0;">
              <div class="form-group">
                <label for="namaBeasiswa">Nama Beasiswa</label>
                <input type="text" class="form-control" id="namaBeasiswa" placeholder="Masukkan nama beasiswa" required>
              </div>
              <div class="form-group">
                <label for="namaPerusahaan">Nama Perusaan / Mitra</label>
                <input type="text" class="form-control" id="namaPerusahaan" placeholder="Otomatis berdasarkan akun" value="Prestasi Kita Foundation" readonly>
              </div>
              <div class="form-group">
                <label for="deskripsiSingkat">Deskripsi Singkat?</label>
                <input type="text" class="form-control" id="deskripsiSingkat" placeholder="Deskripsi singkat beasiswa" required>
              </div>
            </div>

            <div class="form-section" style="margin-bottom: 0;">
              <div class="form-group">
                <label for="deskripsiLengkap">Deskripsi Lengkap</label>
                <textarea class="form-control text-area-large" id="deskripsiLengkap" placeholder="Tuliskan deskripsi lengkap beasiswa..." required></textarea>
              </div>
            </div>

            <div class="form-section" style="margin-bottom: 0;">
              <div class="form-group">
                <label for="informasiBeasiswa">Informasi Beasiswa</label>
                <textarea class="form-control" id="informasiBeasiswa" rows="10" placeholder="Tuliskan persyaratan, ketentuan, benefit, keuntungan, dan informasi lainnya..." required style="min-height:250px;"></textarea>
              </div>
            </div>

            <div class="form-section" style="margin-bottom: 0;">
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="tanggalMulai">Tanggal Mulai Pendaftaran</label>
                    <input type="date" class="form-control" id="tanggalMulai" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="tanggalDeadline">Deadline Pendaftaran</label>
                    <input type="date" class="form-control" id="tanggalDeadline" required>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label for="linkExternal">Link Pendaftaran (External)</label>
                <input type="url" class="form-control" id="linkExternal" placeholder="https://example.com/daftar">
              </div>
            </div>

            <button type="submit" class="btn-submit-form">
              <i class="bi bi-upload"></i> Upload Beasiswa
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }

    function toggleFilterSection(header) {
      const options = header.nextElementSibling;
      const icon = header.querySelector('i');
      if (options.style.display === 'none') {
        options.style.display = 'block';
        icon.classList.replace('bi-chevron-down', 'bi-chevron-up');
      } else {
        options.style.display = 'none';
        icon.classList.replace('bi-chevron-up', 'bi-chevron-down');
      }
    }

    function previewPoster(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('posterPreview');
          img.src = e.target.result;
          img.style.display = 'block';
          document.getElementById('posterPlus').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function updateSelectedTags() {
      const tagsContainer = document.getElementById('selectedTags');
      const checkboxes = document.querySelectorAll('.tag-checkbox:checked');
      const radios = document.querySelectorAll('.tag-radio:checked');

      let tags = [];
      checkboxes.forEach(cb => tags.push(cb.value));
      radios.forEach(r => tags.push(r.value));

      tagsContainer.innerHTML = tags.map(tag => `
        <span class="filter-tag">
          ${tag}
          <span class="remove-tag" onclick="removeTag('${tag}')">&times;</span>
        </span>
      `).join('');
    }

    function removeTag(tagValue) {
      const checkbox = document.querySelector(`.tag-checkbox[value="${tagValue}"]`);
      if (checkbox) { checkbox.checked = false; }
      const radio = document.querySelector(`.tag-radio[value="${tagValue}"]`);
      if (radio) { radio.checked = false; }
      updateSelectedTags();
    }

    function clearAllTags() {
      document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false);
      document.querySelectorAll('.tag-radio').forEach(r => r.checked = false);
      updateSelectedTags();
    }

    // Auto-fill company name based on logged in user
    document.addEventListener('DOMContentLoaded', () => {
      const role = localStorage.getItem('userRole');
      if (role === 'mitra') {
        const name = localStorage.getItem('userName') || 'Prestasi Kita Foundation';
        document.getElementById('namaPerusahaan').value = name;
      }
    });

    function handleUploadBeasiswa(e) {
      e.preventDefault();
      alert('Beasiswa berhasil diupload! Data akan ditinjau oleh admin.');
      const role = localStorage.getItem('userRole');
      if (role === 'admin') {
        window.location.href = 'admin/beasiswa.html';
      } else {
        window.location.href = 'mitra-dashboard.html';
      }
    }
  </script>
</body>
</html>

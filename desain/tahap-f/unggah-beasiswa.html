<!DOCTYPE html>
<html lang="id">

<head>
    <!-- ========== HEAD ========== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unggah Beasiswa — Admin Beasiswa POLIJE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #00B4D8;
            --color-primary-dark: #0096B4;
            --color-secondary: #007A94;
            --color-light: #90E0EF;
            --color-lighter: #CAF0F8;
            --color-text: #333333;
            --color-text-muted: #6c757d;
            --color-white: #ffffff;
            --color-dark: #03045E;
            --sidebar-width: 260px;
        }

        /* CUSTOM CSS */
        .sidebar-admin {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--color-dark);
            color: var(--color-white);
            display: flex;
            flex-direction: column;
            z-index: 1040;
            overflow-y: auto;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 1.25rem 1.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: var(--color-white);
            flex-shrink: 0;
        }

        .sidebar-brand:hover {
            color: var(--color-primary);
        }

        .sidebar-brand .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .sidebar-brand .brand-text {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.2;
        }

        .sidebar-brand .brand-subtitle {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.35);
            padding: 1.2rem 1.3rem 0.45rem;
            font-weight: 600;
        }

        .sidebar-nav {
            list-style: none;
            margin: 0;
            padding: 0.4rem 0.7rem;
            flex: 1;
        }

        .sidebar-nav .nav-item {
            margin-bottom: 2px;
        }

        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.85rem;
            border-radius: 0.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .sidebar-nav .nav-link i {
            font-size: 1.15rem;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-nav .nav-link:hover {
            background-color: rgba(0, 180, 216, 0.12);
            color: var(--color-primary);
        }

        .sidebar-nav .nav-link.active {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: var(--color-white);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
        }

        .sidebar-badge {
            margin-left: auto;
            background-color: #dc3545;
            color: var(--color-white);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 50px;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.3rem;
            flex-shrink: 0;
        }

        .sidebar-footer .admin-info {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            color: var(--color-white);
        }

        .sidebar-footer .admin-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sidebar-footer .admin-name {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .sidebar-footer .admin-role {
            font-size: 0.7rem;
            color: var(--color-text-muted);
        }

        .sidebar-footer .btn-logout {
            margin-left: auto;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0.3rem;
            cursor: pointer;
        }

        .sidebar-footer .btn-logout:hover {
            color: #dc3545;
        }

        .main-content-admin {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            background-color: #f5f7fa;
        }

        .topbar-admin {
            background-color: var(--color-white);
            border-bottom: 1px solid #e9ecef;
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-admin .page-title {
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--color-text);
            margin: 0;
        }

        .form-control:focus,
        .form-select:focus,
        .form-check-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 .25rem rgba(0, 180, 216, .25);
        }

        .form-check-input:checked {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }
    </style>
</head>

<body>

    <div class="main-content-admin">
        <div class="topbar-admin">
            <h1 class="page-title">Unggah Beasiswa</h1>
            <a href="kelola-beasiswa.html" class="btn btn-sm btn-outline-secondary fw-semibold"><i
                    class="bi bi-arrow-left me-1"></i>Kembali</a>
        </div>

        <!-- ========== KONTEN UTAMA ========== -->
        <div class="p-4">
            <div class="card border-0 shadow-sm rounded-4" style="max-width: 850px;">
                <div class="card-body p-4 p-md-5">
                    <form action="#" method="POST" enctype="multipart/form-data">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nama Beasiswa</label>
                                <input type="text" class="form-control" placeholder="Contoh: Beasiswa KIP Kuliah 2024"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nama Penyelenggara</label>
                                <input type="text" class="form-control" placeholder="Contoh: Kemendikbudristek"
                                    required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Deskripsi Singkat</label>
                                <input type="text" class="form-control"
                                    placeholder="Penjelasan singkat 1-2 kalimat (Maks 150 karakter)" maxlength="150"
                                    required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Deskripsi Lengkap</label>
                                <textarea class="form-control" rows="5"
                                    placeholder="Penjelasan lengkap mengenai program beasiswa ini, latar belakang, dan tujuan program."
                                    required></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Informasi Beasiswa (Persyaratan)</label>
                                <textarea class="form-control" rows="5"
                                    placeholder="Sebutkan persyaratan pendaftar, fasilitas yang didapat, tahapan seleksi, dll."
                                    required></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tanggal Dibuka</label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tanggal Ditutup</label>
                                <input type="date" class="form-control" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Link Pendaftaran Eksternal (Opsional)</label>
                                <input type="url" class="form-control" placeholder="https://...">
                                <div class="form-text">Isi jika mahasiswa harus mendaftar ke website eksternal
                                    penyelenggara.</div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Upload Poster</label>
                                <input type="file" class="form-control" accept="image/jpeg,image/png,image/jpg"
                                    required>
                                <div class="form-text">Format: JPG, JPEG, PNG. Maks 2MB. Resolusi disarankan 600x300
                                    pixel.</div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold d-block mb-3">Pilih Tag Beasiswa</label>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <div class="fw-semibold mb-2"
                                            style="font-size:0.9rem;color:var(--color-primary);">Jenjang</div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagD2"><label class="form-check-label" for="tagD2">D2</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagD3"><label class="form-check-label" for="tagD3">D3</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagD4"><label class="form-check-label" for="tagD4">D4</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagS1"><label class="form-check-label" for="tagS1">S1</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagS2"><label class="form-check-label" for="tagS2">S2</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagS3"><label class="form-check-label" for="tagS3">S3</label></div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="fw-semibold mb-2"
                                            style="font-size:0.9rem;color:var(--color-primary);">Tipe Pendanaan</div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagFull"><label class="form-check-label" for="tagFull">Fully
                                                Funded</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagPartial"><label class="form-check-label"
                                                for="tagPartial">Partially Funded</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagSelf"><label class="form-check-label" for="tagSelf">Self
                                                Funded</label></div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="fw-semibold mb-2"
                                            style="font-size:0.9rem;color:var(--color-primary);">Tipe Beasiswa</div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagComp"><label class="form-check-label"
                                                for="tagComp">Company/Institution</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagGov"><label class="form-check-label"
                                                for="tagGov">Government</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagUni"><label class="form-check-label"
                                                for="tagUni">University</label></div>
                                        <div class="form-check mt-2"><input class="form-check-input" type="checkbox"
                                                id="tagPrestasi"><label class="form-check-label"
                                                for="tagPrestasi">Prestasi</label></div>
                                        <div class="form-check"><input class="form-check-input" type="checkbox"
                                                id="tagSKTM"><label class="form-check-label" for="tagSKTM">SKTM</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 text-end mt-4">
                                <a href="kelola-beasiswa.html" class="btn btn-light px-4 me-2">Batal</a>
                                <button type="submit" class="btn px-4 fw-semibold"
                                    style="background-color:var(--color-primary);border-color:var(--color-primary);color:#fff;">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i>Simpan & Unggah
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- ========== END KONTEN ========== -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // CUSTOM JS
    </script>
</body>

</html>

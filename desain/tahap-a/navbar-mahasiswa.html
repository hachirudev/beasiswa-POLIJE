        /* ============================================================
       CSS CUSTOM PROPERTIES — Diekstrak dari desain Figma
       ============================================================ */
        :root {
            --color-primary: #00B4D8;
            --color-primary-dark: #0096B4;
            --color-secondary: #007A94;
            --color-light: #90E0EF;
            --color-lighter: #CAF0F8;
            --color-text: #333333;
            --color-text-muted: #6c757d;
            --color-white: #ffffff;
            --color-dark: #03045E;
        }

        /* CUSTOM CSS */

        /* --- Navbar --- */
        .navbar-beasiswa {
            background-color: var(--color-white);
            border-bottom: 2px solid var(--color-light);
            padding: 0.65rem 0;
            transition: box-shadow 0.3s ease;
        }

        .navbar-beasiswa.scrolled {
            box-shadow: 0 2px 12px rgba(0, 180, 216, 0.12);
        }

        .navbar-beasiswa .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--color-primary);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .navbar-beasiswa .navbar-brand:hover {
            opacity: 0.85;
        }

        .navbar-beasiswa .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-white);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .navbar-beasiswa .nav-link {
            color: var(--color-primary) !important;
            font-weight: 500;
            font-size: 0.925rem;
            padding: 0.5rem 0.9rem !important;
            position: relative;
            transition: color 0.2s, opacity 0.2s;
        }

        .navbar-beasiswa .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%;
            height: 2px;
            background-color: var(--color-primary);
            border-radius: 2px;
            transition: transform 0.25s ease;
        }

        .navbar-beasiswa .nav-link:hover::after,
        .navbar-beasiswa .nav-link.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .navbar-beasiswa .nav-link:hover {
            color: var(--color-primary-dark) !important;
        }

        .navbar-beasiswa .nav-link.active {
            color: var(--color-primary-dark) !important;
            font-weight: 600;
        }

        /* Dropdown styling */
        .navbar-beasiswa .dropdown-menu {
            border: 1px solid var(--color-light);
            border-radius: 0.5rem;
            box-shadow: 0 4px 16px rgba(0, 180, 216, 0.1);
            padding: 0.4rem 0;
            margin-top: 0.35rem;
        }

        .navbar-beasiswa .dropdown-item {
            color: var(--color-text);
            font-size: 0.9rem;
            padding: 0.5rem 1.1rem;
            transition: background-color 0.15s, color 0.15s;
        }

        .navbar-beasiswa .dropdown-item:hover,
        .navbar-beasiswa .dropdown-item:focus {
            background-color: var(--color-lighter);
            color: var(--color-primary-dark);
        }

        /* Profile dropdown — hapus garis hover bawaan nav-link */
        .navbar-beasiswa .nav-item.dropdown>.nav-link.dropdown-toggle.profile-link::after {
            display: none !important;
        }

        /* Profile icon button */
        .btn-profile {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            transition: background-color 0.2s, color 0.2s, transform 0.2s;
            padding: 0;
        }

        .btn-profile:hover {
            background-color: var(--color-primary);
            color: var(--color-white);
            transform: scale(1.05);
        }

        /* Notification badge */
        .badge-notif {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #dc3545;
            border: 2px solid var(--color-white);
        }

        /* Mobile toggler */

    <script>
        // CUSTOM JS

        // Tambahkan shadow saat scroll
        (function () {
            const navbar = document.getElementById('navbar-mahasiswa');
            if (!navbar) return;

            window.addEventListener('scroll', function () {
                if (window.scrollY > 10) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        })();
    </script>

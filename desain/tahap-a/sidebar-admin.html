    <style>
        /* ============================================================
       CSS CUSTOM PROPERTIES — Diekstrak dari desain Figma
       ============================================================ */
        :root {
            --color-primary: #00B4D8;
            --color-primary-dark: #0096B4;
            --color-secondary: #007A94;
            --color-light: #90E0EF;
            --color-lighter: #CAF0F8;
            --color-text: #333333;
            --color-text-muted: #6c757d;
            --color-white: #ffffff;
            --color-dark: #03045E;

            --sidebar-width: 260px;
        }

        /* CUSTOM CSS */

        /* --- Sidebar --- */
        .sidebar-admin {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--color-dark);
            color: var(--color-white);
            display: flex;
            flex-direction: column;
            z-index: 1040;
            overflow-y: auto;
        }

        /* Brand area */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 1.25rem 1.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: var(--color-white);
            flex-shrink: 0;
        }

        .sidebar-brand .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .sidebar-brand .brand-text {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.2;
        }

        .sidebar-brand .brand-subtitle {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Menu label */
        .sidebar-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.35);
            padding: 1.2rem 1.3rem 0.45rem;
            font-weight: 600;
        }

        /* Nav links */
        .sidebar-nav {
            list-style: none;
            margin: 0;
            padding: 0.4rem 0.7rem;
            flex: 1;
        }

        .sidebar-nav .nav-item {
            margin-bottom: 2px;
        }

        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.85rem;
            border-radius: 0.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .sidebar-nav .nav-link i {
            font-size: 1.15rem;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-nav .nav-link:hover {
            background-color: rgba(0, 180, 216, 0.12);
            color: var(--color-primary);
        }

        .sidebar-nav .nav-link.active {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: var(--color-white);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
        }

        /* Badge */
        .sidebar-badge {
            margin-left: auto;
            background-color: #dc3545;
            color: var(--color-white);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 50px;
        }

        /* Sidebar footer — admin profile */
        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.3rem;
            flex-shrink: 0;
        }

        .sidebar-footer .admin-info {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            color: var(--color-white);
        }

        .sidebar-footer .admin-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sidebar-footer .admin-name {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .sidebar-footer .admin-role {
            font-size: 0.7rem;
            color: var(--color-text-muted);
        }

        .sidebar-footer .btn-logout {
            margin-left: auto;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0.3rem;
            cursor: pointer;
        }

        .sidebar-footer .btn-logout:hover {
            color: #dc3545;
        }

        /* --- Main content area offset --- */
        .main-content-admin {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            background-color: #f5f7fa;
        }

        /* Top bar for admin */
        .topbar-admin {
            background-color: var(--color-white);
            border-bottom: 1px solid #e9ecef;
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-admin .page-title {
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--color-text);
            margin: 0;
        }
    </style>
</head>

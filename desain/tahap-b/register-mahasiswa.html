<!DOCTYPE html>
<html lang="id">

<head>
    <!-- ========== HEAD ========== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Akun — Beasiswa POLIJE</title>
    <meta name="description" content="Daftar akun mahasiswa untuk mengakses layanan Beasiswa POLIJE.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ============================================================
       CSS CUSTOM PROPERTIES — Dari Tahap A
       ============================================================ */
        :root {
            --color-primary: #00B4D8;
            --color-primary-dark: #0096B4;
            --color-secondary: #007A94;
            --color-light: #90E0EF;
            --color-lighter: #CAF0F8;
            --color-text: #333333;
            --color-text-muted: #6c757d;
            --color-white: #ffffff;
            --color-dark: #03045E;
        }

        /* CUSTOM CSS */

        body {
            margin: 0;
            min-height: 100vh;
        }

        /* --- Background --- */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--color-lighter) 0%, var(--color-light) 35%, var(--color-primary) 100%);
            padding: 2rem 1rem;
        }

        /* --- Card --- */
        .auth-card {
            background-color: var(--color-white);
            border-radius: 1.2rem;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 460px;
        }

        /* Brand header */
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            margin-bottom: 1.5rem;
            text-decoration: none;
            color: var(--color-primary);
            font-weight: 700;
            font-size: 1.15rem;
        }

        .auth-brand .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-white);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .auth-title {
            text-align: center;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--color-text);
            margin-bottom: 0.25rem;
        }

        .auth-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 1.5rem;
        }

        /* Role badge — hanya mahasiswa */
        .role-badge-static {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: var(--color-white);
            border-radius: 0.55rem;
            padding: 0.55rem 1.3rem;
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
        }

        .role-badge-static i {
            font-size: 1.1rem;
        }

        /* Form labels & inputs */
        .auth-card .form-label {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--color-text);
            margin-bottom: 0.35rem;
        }

        .auth-card .form-control,
        .auth-card .form-select {
            border: 1.5px solid #dee2e6;
            border-radius: 0.55rem;
            padding: 0.65rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-card .form-control:focus,
        .auth-card .form-select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);
        }

        .auth-card .form-control::placeholder {
            color: #adb5bd;
        }

        /* Password toggle */
        .input-password-wrapper {
            position: relative;
        }

        .input-password-wrapper .form-control {
            padding-right: 2.8rem;
        }

        .btn-toggle-password {
            position: absolute;
            top: 50%;
            right: 0.75rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-size: 1.1rem;
            padding: 0;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-toggle-password:hover {
            color: var(--color-primary);
        }

        /* Submit button */
        .btn-auth-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: var(--color-white);
            border: none;
            border-radius: 0.55rem;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-auth-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0, 180, 216, 0.35);
            color: var(--color-white);
        }

        /* Footer link */
        .auth-footer-text {
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 1.25rem;
        }

        .auth-footer-text a {
            color: var(--color-primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer-text a:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }

        /* Flash message area */
        .auth-alert {
            border-radius: 0.55rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <!-- ========== KONTEN UTAMA ========== -->
    <div class="auth-page" id="register-page">
        <div class="auth-card">
            <!-- Brand -->
            <a href="index.html" class="auth-brand">
                <span class="brand-icon">
                    <i class="bi bi-mortarboard-fill"></i>
                </span>
                Beasiswa POLIJE
            </a>

            <h1 class="auth-title">Buat Akun</h1>
            <p class="auth-subtitle">Daftar untuk mengakses layanan beasiswa</p>

            <!-- Flash message placeholder -->
            <!-- <div class="alert alert-danger auth-alert" role="alert">Email sudah terdaftar.</div> -->

            <form id="form-register" method="POST" action="#">
                <!-- Nama Lengkap -->
                <div class="mb-3">
                    <label for="input-nama" class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="input-nama" name="nama"
                        placeholder="Masukkan nama lengkap" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="input-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="input-email" name="email"
                        placeholder="contoh@email.com" required>
                </div>

                <!-- NIM -->
                <div class="mb-3">
                    <label for="input-nim" class="form-label">NIM</label>
                    <input type="text" class="form-control" id="input-nim" name="NIM" placeholder="Masukkan NIM"
                        required>
                </div>

                <!-- Program Studi -->
                <div class="mb-3">
                    <label for="select-prodi" class="form-label">Program Studi</label>
                    <select class="form-select" id="select-prodi" name="id_prodi" required>
                        <option value="" disabled selected>Pilih Program Studi</option>
                        <option value="1">Teknik Informatika — Teknologi Informasi</option>
                        <option value="2">Manajemen Informatika — Teknologi Informasi</option>
                        <option value="3">Teknik Energi Terbarukan — Teknik</option>
                        <option value="4">Akuntansi — Ekonomi</option>
                        <option value="5">Manajemen Agribisnis — Pertanian</option>
                    </select>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="input-password" class="form-label">Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" class="form-control" id="input-password" name="password"
                            placeholder="Minimal 8 karakter" minlength="8" required>
                        <button type="button" class="btn-toggle-password" data-target="input-password"
                            aria-label="Tampilkan password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Konfirmasi Password -->
                <div class="mb-4">
                    <label for="input-password-confirm" class="form-label">Konfirmasi Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" class="form-control" id="input-password-confirm" name="password_confirm"
                            placeholder="Ulangi password" minlength="8" required>
                        <button type="button" class="btn-toggle-password" data-target="input-password-confirm"
                            aria-label="Tampilkan konfirmasi password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-auth-submit" id="btn-register-submit">Daftar</button>
            </form>

            <!-- Login link -->
            <p class="auth-footer-text">
                Sudah punya akun? <a href="login.html" id="link-masuk">Masuk</a>
            </p>
        </div>
    </div>
    <!-- ========== END KONTEN ========== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // CUSTOM JS

        // Toggle password visibility (multiple)
        (function () {
            document.querySelectorAll('.btn-toggle-password').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var targetId = btn.getAttribute('data-target');
                    var input = document.getElementById(targetId);
                    if (!input) return;

                    var isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    btn.querySelector('i').className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
                });
            });
        })();

        // Client-side password match validation
        (function () {
            var form = document.getElementById('form-register');
            if (!form) return;

            form.addEventListener('submit', function (e) {
                var password = document.getElementById('input-password').value;
                var confirm = document.getElementById('input-password-confirm').value;

                if (password !== confirm) {
                    e.preventDefault();
                    alert('Password dan konfirmasi password tidak cocok.');
                    document.getElementById('input-password-confirm').focus();
                }
            });
        })();
    </script>
</body>

</html>
